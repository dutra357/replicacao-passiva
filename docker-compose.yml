version: '3.8'

services:
  server-1:
    build: ./rep-server
    ports: ["8081:8080"]
    environment:
      - SERVER_ID=server-1
      - SERVER_LIST=http://server-1:8080,http://server-2:8080,http://server-3:8080

  server-2:
    build: ./rep-server
    ports: ["8082:8080"]
    environment:
      - SERVER_ID=server-2
      - SERVER_LIST=http://server-1:8080,http://server-2:8080,http://server-3:8080

  server-3:
    build: ./rep-server
    ports: ["8083:8080"]
    environment:
      - SERVER_ID=server-3
      - SERVER_LIST=http://server-1:8080,http://server-2:8080,http://server-3:8080

  client-1:
    build: ./rep-client
    environment:
      - CLIENT_ID=client-1
      - SERVER_LIST=http://server-1:8080,http://server-2:8080,http://server-3:8080
    depends_on:
      - server-1
      - server-2
      - server-3

  client-2:
    build: ./rep-client
    environment:
      - CLIENT_ID=client-2
      - SERVER_LIST=http://server-1:8080,http://server-2:8080,http://server-3:8080
    depends_on:
      - server-1
      - server-2
      - server-3